name: cmake macOS

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-latest is Apple Silicon (arm64) and builds with AppleClang +
        # libc++, i.e. the toolchain that exercises Apple-specific standard
        # library behavior (e.g. the missing floating-point std::from_chars).
        os: [macos-latest]

    steps:
    - uses: actions/checkout@v7

    # Install via Homebrew rather than turtlebrowser/get-conan: on macOS runners
    # that action's `pip3 install` fails with PEP 668 (externally-managed-environment).
    - name: Install Conan
      run: brew install conan

    - name: Create default profile
      run: conan profile detect

    - name: Install conan dependencies
      run: conan install conanfile.py -s build_type=${{env.BUILD_TYPE}} --build=missing --settings:host compiler.cppstd=17

    - name: Normalize build type
      shell: bash
      run: echo "BUILD_TYPE_LOWERCASE=$(echo "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Configure CMake
      shell: bash
      run: cmake --preset conan-${{ env.BUILD_TYPE_LOWERCASE }}

    - name: Build
      shell: bash
      run: cmake --build --preset conan-${{ env.BUILD_TYPE_LOWERCASE }}

    # Several tests assert tight wall-clock timing bounds that the shared macOS
    # runners cannot always meet (they are ~10-30% slower/noisier). Retry failed
    # tests a couple of times to absorb that flakiness without weakening the
    # assertions for every other platform.
    - name: run test (macOS)
      run: ctest --test-dir build/${{env.BUILD_TYPE}} --output-on-failure --repeat until-pass:5

    # TEMPORARY diagnostic: capture lldb backtraces for any crashing tests.
    # Remove once the macOS-specific failures are fixed.
    - name: Backtraces for crashing tests (diagnostic)
      if: failure()
      working-directory: ${{ github.workspace }}/build/${{ env.BUILD_TYPE }}
      run: |
        BIN=tests/behaviortree_cpp_test
        for t in \
          "Decorator.DelayWithXML" \
          "Substitution.StringSubstitutionWithSimpleAction_Issue930" \
          "Substitution.JsonStringSubstitutionWithDelay_Issue930" \
          "Parallel.Issue819_SequenceVsReactiveSequence" ; do
          echo "==================== $t ===================="
          lldb --batch -o "run" -k "thread backtrace all" -k "quit" \
            -- "$BIN" "--gtest_filter=$t" 2>&1 | tail -80 || true
        done
