# RTD project must be configured to read this file at `python/.readthedocs.yaml`
# (Project Settings → Advanced → "Path for `.readthedocs.yaml`").

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev

sphinx:
  configuration: docs/conf.py

formats:
  - htmlzip
